<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" width="1440" height="320" role="img" aria-label="Andrejs Rinkevičs — System Architect &amp; Full-stack Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1024"/>
      <stop offset="1" stop-color="#102a52"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <style>
      .name { font: 700 56px 'Segoe UI', Ubuntu, 'Helvetica Neue', Arial, sans-serif; fill: #f8fafc; }
      .role { font: 400 23px 'Segoe UI', Ubuntu, 'Helvetica Neue', Arial, sans-serif; fill: #c7d2fe; }
      .tag  { font: 500 16px 'Segoe UI', Ubuntu, Arial, sans-serif; fill: #93c5fd; letter-spacing: .5px; }
    </style>
  </defs>

  <rect width="1440" height="320" fill="url(#bg)"/>

  <g fill="none" stroke="url(#wave)">
    <path d="M 0 28 Q 360 20 720 28 T 1440 28"  opacity="0.18" stroke-width="1"/>
    <path d="M 0 56 Q 360 44 720 56 T 1440 56"  opacity="0.26" stroke-width="1"/>
    <path d="M 0 92 Q 360 74 720 92 T 1440 92"  opacity="0.36" stroke-width="1.25"/>
    <g>
      <path d="M 0 136 Q 360 114 720 136 T 1440 136 Q 1800 114 2160 136 T 2880 136" opacity="0.5" stroke-width="1.75"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-1440 0" dur="22s" repeatCount="indefinite"/>
    </g>
    <path d="M 0 184 Q 360 158 720 184 T 1440 184" opacity="0.65" stroke-width="2"/>
    <g>
      <path d="M 0 232 Q 360 202 720 232 T 1440 232 Q 1800 202 2160 232 T 2880 232" opacity="0.8" stroke-width="2"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-1440 0" dur="34s" repeatCount="indefinite"/>
    </g>
    <path d="M 0 280 Q 360 246 720 280 T 1440 280" opacity="0.92" stroke-width="2.25"/>
  </g>

  <text x="64" y="120" class="name">Andrejs Rinkevičs</text>
  <text x="66" y="158" class="role">System Architect · Full-stack Software Engineer</text>
  <text x="66" y="190" class="tag">SENIOR PYTHON &amp; JAVASCRIPT · RIGA, LATVIA</text>
</svg>
